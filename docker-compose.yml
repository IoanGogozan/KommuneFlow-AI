services:
  postgres:
    image: postgres:17-alpine
    container_name: kommuneflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kommuneflow_ai}
      POSTGRES_USER: ${POSTGRES_USER:-kommuneflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kommuneflow_dev_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kommuneflow} -d ${POSTGRES_DB:-kommuneflow_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
