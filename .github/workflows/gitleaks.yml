name: Gitleaks

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "37 3 * * 1"

jobs:
  scan:
    name: Secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
